<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 200px; padding: 14px;
    font-family: -apple-system, sans-serif; font-size: 13px;
    background: #111; color: #eee; margin: 0;
  }
  button {
    width: 100%; padding: 9px;
    background: #ff7a2f; border: none; border-radius: 5px;
    color: white; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  button:hover { background: #e06a28; }
  button:disabled { background: #555; cursor: default; }
  #status { margin-top: 9px; font-size: 11px; color: #888; text-align: center; min-height: 16px; }
</style>
</head>
<body>
<button id="btn">Передать сессию</button>
<div id="status"></div>
<script src="popup.js"></script>
</body>
</html>
